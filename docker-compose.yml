services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fridge
      POSTGRES_USER: fridge
      POSTGRES_PASSWORD: fridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fridge:fridge@db:5432/fridge
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
