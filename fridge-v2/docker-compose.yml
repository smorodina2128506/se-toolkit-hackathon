services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fridge
      POSTGRES_USER: fridge
      POSTGRES_PASSWORD: fridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fridge:fridge@db:5432/fridge
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://${VM_IP:-localhost}:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
